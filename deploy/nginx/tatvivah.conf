upstream tatvivah_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream tatvivah_backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name tatvivahtrends.com www.tatvivahtrends.com admin.tatvivahtrends.com seller.tatvivahtrends.com;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/xml image/svg+xml;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location /v1/ {
        proxy_pass http://tatvivah_backend;
    }

    location = /health/live {
        proxy_pass http://tatvivah_backend;
        add_header Cache-Control "no-store" always;
    }

    location = /health {
        proxy_pass http://tatvivah_backend;
        add_header Cache-Control "no-store" always;
    }

    location ~* ^/_next/static/ {
        proxy_pass http://tatvivah_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/(images|fonts)/ {
        proxy_pass http://tatvivah_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(?:js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        proxy_pass http://tatvivah_frontend;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    }

    location / {
        proxy_pass http://tatvivah_frontend;
    }
}
