<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2825;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#3D3329;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5C524A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B7956C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#B7956C;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#accent)"/>
  <circle cx="400" cy="400" r="250" fill="#B7956C" opacity="0.05"/>
</svg>
