<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Golden "T" Logo -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4915E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative top swirl -->
  <path d="M 50 40 Q 70 30, 100 35 Q 130 40, 150 25" stroke="url(#goldGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Main T shape -->
  <g fill="url(#goldGradient)">
    <!-- Top horizontal bar -->
    <rect x="45" y="50" width="110" height="15" rx="3"/>
    
    <!-- Vertical stem -->
    <rect x="85" y="65" width="30" height="120" rx="3"/>
  </g>
  
  <!-- Decorative bottom swirl -->
  <path d="M 70 160 Q 100 170, 130 160" stroke="url(#goldGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>