services:
  - type: web
    name: tatvivah-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISMA_LOG_QUERIES
        value: "false"
