services:
  - type: web
    name: tatvivah-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISMA_LOG_QUERIES
        value: "false"
      # PhonePe PG (Standard Checkout v2). Secrets are set in the Render
      # dashboard (sync: false); non-secret values are pinned here.
      - key: PHONEPE_ENV
        value: PRODUCTION
      - key: PHONEPE_CLIENT_VERSION
        value: "1"
      - key: PHONEPE_CLIENT_ID
        sync: false
      - key: PHONEPE_CLIENT_SECRET
        sync: false
      - key: PHONEPE_WEBHOOK_USERNAME
        sync: false
      - key: PHONEPE_WEBHOOK_PASSWORD
        sync: false
